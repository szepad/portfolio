<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/contact.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <span id="logo-name">Szép Adrián Attila</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="contact">
        <div class="contact-container">
            <h2>Contact me!</h2>
            <form action="mailto:szepad06@gmail.com" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required placeholder="Subject">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Write your message here..."></textarea>
                </div>
                <div class="form-group">
                    <div class="radio-item">
                        <input type="radio" id="gender1" name="gender" value="Male" checked>
                        <label for="gender1" class="radio-label">Male</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="gender2" name="gender" value="Female">
                        <label for="gender2" class="radio-label">Female</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="gender3" name="gender" value="Other">
                        <label for="gender3" class="radio-label">Other</label>
                    </div>
                </div>
                <div class="form-group" id="eula">
                    <input type="checkbox">
                    <label>I have read and agree to the Terms and Conditions and Privacy Policy</label>
                </div>
                <div class="cta-buttons" id="form-buttons">
                    <button type="submit" class="btn btn-green">Send Message</button>
                    <button type="reset" class="btn btn-green">Reset</button>
                </div>
            </form>
        </div>
        <div class="social-icons">
            <a href="https://github.com/szepad"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Szép Adrián Attila. All rights reserved.</p>
    </footer>
    <script src="scripts/main.js"></script>
</body>
</html>
